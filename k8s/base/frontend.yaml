apiVersion: apps/v1
kind: Deployment

metadata:
  name: attendance-frontend
  namespace: attendance

spec:
  replicas: 2

  selector:
    matchLabels:
      app: attendance-frontend

  template:
    metadata:
      labels:
        app: attendance-frontend

    spec:
      containers:
        - name: frontend
          image: erfanasir/school-attendance-frontend:v2

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: attendance-frontend
  namespace: attendance

spec:
  selector:
    app: attendance-frontend

  ports:
    - port: 80
      targetPort: 80