apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: attendance-backend-hpa
  namespace: attendance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: attendance-backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50