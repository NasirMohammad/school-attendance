apiVersion: apps/v1
kind: Deployment
metadata:
  name: attendance-backend
  namespace: attendance
spec:
  replicas: 2
  selector:
    matchLabels:
      app: attendance-backend
      version: v1
  template:
    metadata:
      labels:
        app: attendance-backend
        version: v1
    spec:
      containers:
        - name: backend
          image: erfanasir/school-attendance-backend:v1
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
---
---
apiVersion: v1
kind: Service
metadata:
  name: attendance-backend
  namespace: attendance

spec:
  type: NodePort

  selector:
    app: attendance-backend

  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080