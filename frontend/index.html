<!DOCTYPE html>
<html>
<head>
  <title>School Attendance V1</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f6f8;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 700px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .version {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>School Attendance System</h1>
    <p class="version">Frontend Version: V1</p>
    <p id="apiStatus">Checking backend...</p>

    <h2>Students</h2>
    <div id="students"></div>
  </div>

  <script>
    const API_BASE = "/api";

    async function loadStatus() {
      const res = await fetch(API_BASE + "/");
      const data = await res.json();
      document.getElementById("apiStatus").innerText =
        "Backend: " + data.version + " - " + data.status;
    }

    async function loadStudents() {
      const res = await fetch(API_BASE + "/students");
      const students = await res.json();

      document.getElementById("students").innerHTML = students.map(s => `
        <div>
          <b>${s.name}</b> - ${s.class_name}
          <button onclick="markAttendance(${s.id}, 'present')">Present</button>
          <button onclick="markAttendance(${s.id}, 'absent')">Absent</button>
        </div>
      `).join("");
    }

    async function markAttendance(id, status) {
      await fetch(API_BASE + "/attendance", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          student_id: id,
          status: status
        })
      });

      alert("Attendance saved: " + status);
    }

    loadStatus();
    loadStudents();
  </script>
</body>
</html>
